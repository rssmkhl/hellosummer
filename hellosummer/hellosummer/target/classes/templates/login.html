<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #10232A 0%, #3D4D55 50%, #161616 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
        }
        h2 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #D3C3B9;
            letter-spacing: -0.5px;
        }
        .subtitle {
            text-align: center;
            color: #A79E9C;
            font-size: 14px;
            margin-bottom: 40px;
            font-weight: 400;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 500;
            color: #A79E9C;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 16px 18px;
            border: 1px solid rgba(167, 158, 156, 0.3);
            border-radius: 12px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.05);
            color: #D3C3B9;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
        }
        input::placeholder {
            color: rgba(167, 158, 156, 0.5);
        }
        input:focus {
            outline: none;
            border-color: #B58863;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(181, 136, 99, 0.15);
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #B58863 0%, #c79a75 100%);
            color: #161616;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 12px;
            letter-spacing: 0.3px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(181, 136, 99, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .link-container {
            text-align: center;
            margin-top: 32px;
            font-size: 14px;
            color: #A79E9C;
        }
        .link-container a {
            color: #B58863;
            text-decoration: none;
            font-weight: 600;
            margin-left: 6px;
            transition: color 0.2s ease;
        }
        .link-container a:hover {
            color: #D3C3B9;
        }
        .error {
            color: #e87a7a;
            text-align: center;
            margin-bottom: 24px;
            padding: 14px;
            background: rgba(232, 122, 122, 0.1);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(232, 122, 122, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to continue</p>
        
        <div th:if="${param.error}" class="error">Invalid username or password.</div>
        <div th:if="${param.logout}" class="error">You have been logged out.</div>
        
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit">Sign In</button>
        </form>
        
        <div class="link-container">
            Don't have an account? <a th:href="@{/register}">Create one</a>
        </div>
    </div>
</body>
</html>
