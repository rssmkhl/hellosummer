<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #10232A 0%, #3D4D55 50%, #161616 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 56px 48px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
            text-align: center;
        }
        .greeting-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #B58863 0%, #c79a75 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 32px;
            font-size: 36px;
            box-shadow: 0 12px 30px rgba(181, 136, 99, 0.3);
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #D3C3B9;
            letter-spacing: -0.5px;
        }
        .welcome-text {
            color: #A79E9C;
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.7;
        }
        .welcome-text span {
            color: #B58863;
            font-weight: 600;
        }
        .logout-btn {
            background: rgba(211, 195, 185, 0.1);
            color: #D3C3B9;
            padding: 14px 40px;
            border: 1px solid rgba(211, 195, 185, 0.2);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.3px;
        }
        .logout-btn:hover {
            background: rgba(211, 195, 185, 0.15);
            border-color: rgba(211, 195, 185, 0.3);
            transform: translateY(-2px);
        }
        .logout-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="greeting-icon">👋</div>
        <h1>Hi, <span th:text="${firstName}"></span>!</h1>
        <p class="welcome-text">Welcome back, <span th:text="${firstName}"></span> <span th:text="${lastName}"></span>! We're glad to have you here.</p>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">Sign Out</button>
        </form>
    </div>
</body>
</html>
